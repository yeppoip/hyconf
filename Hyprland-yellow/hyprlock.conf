general {
  no_fade_in = false
  grace = 3
  disable_loading_bar = false
}

background {
  monitor =
  path = /home/nofel/Pictures/wallpapers/geometric-layers-3840x2160-24806.jpg
  blur_passes = 3
  blur_size = 8
  noise = 0.02
  contrast = 0.8936
  brightness = 0.8172
  vibrancy = 0.1696
  vibrancy_darkness = 0.0
}

input-field {
  monitor =
  size = 250, 60
  outline_thickness = 2
  dots_size = 0.2
  dots_spacing = 0.35
  outer_color = rgb(139, 90, 0)
  inner_color = rgb(30, 30, 30)
  font_color = rgb(247, 211, 106)
  font_family = JetBrainsMono Nerd Font
  fade_on_empty = true
  fade_timeout = 1500
  placeholder_text = <i>Password...</i>
  hide_input = false
  check_color = rgb(200, 155, 0)
  fail_color = rgb(255, 107, 107)
  fail_text = <i>$ATTEMPTS failed</i>
  capslock_color = rgb(255, 204, 102)
  position = 0, -100
  halign = center
  valign = center
}

label {
  monitor =
  text = cmd[update:1000] echo "$(date +%H:%M:%S)"
  color = rgba(247, 211, 106, 1.0)
  font_size = 64
  font_family = JetBrainsMono Nerd Font
  position = 0, 100
  halign = center
  valign = center
}

label {
  monitor =
  text = $USER
  color = rgba(200, 155, 0, 1.0)
  font_size = 32
  font_family = JetBrainsMono Nerd Font
  position = 0, 50
  halign = center
  valign = center
